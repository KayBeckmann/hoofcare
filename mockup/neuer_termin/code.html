<style>
        body {
            background-color: #fcf9f4; /* surface */
            color: #1c1c19; /* on-surface */
        }
        
        .chip-regular {
            background-color: #baefc5; /* primary-fixed */
            color: #154628; /* primary */
        }
        
        .chip-akut {
            background-color: #ffddb6; /* secondary-fixed */
            color: #845400; /* secondary */
        }
        
        .chip-geplant {
            background-color: #c5e7ff; /* tertiary-fixed */
            color: #04425c; /* tertiary */
        }

        .input-field {
            background-color: #ffffff; /* surface-container-lowest */
            border: 1px solid #c1c9bf; /* outline-variant */
            color: #1c1c19;
        }
        
        .input-field:focus {
            border-color: #154628; /* primary */
            box-shadow: 0 1px 0 0 #154628;
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased font-body-md text-body-md pb-24 md:pb-8 max-w-2xl mx-auto min-h-screen flex flex-col relative">
<!-- TopAppBar from JSON -->
<header class="sticky top-0 w-full z-50 bg-surface dark:bg-surface-dim flat no shadows border-b border-surface-variant/50">
<div class="flex items-center justify-between px-container-padding h-16 w-full">
<button class="text-on-surface dark:text-on-surface hover:bg-surface-container-low dark:hover:bg-surface-container-high rounded-full p-2 active:opacity-70 transition-opacity flex items-center justify-center min-w-[48px] min-h-[48px]" type="button">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed truncate px-4">Neuer Termin</h1>
<button class="text-primary dark:text-primary-fixed font-semibold hover:bg-surface-container-low dark:hover:bg-surface-container-high rounded-full p-2 active:opacity-70 transition-opacity flex items-center justify-center min-w-[48px] min-h-[48px]" type="button">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow px-container-padding py-md space-y-xl">
<!-- Kunde & Pferd Section -->
<section class="space-y-card-gap">
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="kunde">Kunde auswählen</label>
<div class="relative">
<select class="w-full input-field rounded-lg px-md py-sm appearance-none min-h-[48px] font-body-lg text-body-lg" id="kunde" name="kunde">
<option disabled="" selected="" value="">Kunde suchen...</option>
<option value="1">Anna Müller</option>
<option value="2">Thomas Weber</option>
<option value="3">Reitstall Sonnenhof</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="pferd">Pferd(e) auswählen</label>
<div class="relative">
<select class="w-full input-field rounded-lg px-md py-sm appearance-none min-h-[48px] font-body-lg text-body-lg" id="pferd" name="pferd">
<option disabled="" selected="" value="">Pferd wählen...</option>
<option value="1">Sternchen</option>
<option value="2">Max</option>
<option value="3">Bella</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</section>
<!-- Datum & Uhrzeit Section -->
<section class="space-y-card-gap bg-surface-container-lowest rounded-xl p-md shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-surface-variant/30">
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="datum">Datum</label>
<div class="relative">
<input class="w-full input-field rounded-lg px-md py-sm min-h-[48px] font-body-lg text-body-lg" id="datum" name="datum" type="date"/>
</div>
</div>
<div class="flex gap-md">
<div class="flex-1">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="zeit_von">Von</label>
<input class="w-full input-field rounded-lg px-md py-sm min-h-[48px] font-body-lg text-body-lg" id="zeit_von" name="zeit_von" type="time"/>
</div>
<div class="flex-1">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="zeit_bis">Bis</label>
<input class="w-full input-field rounded-lg px-md py-sm min-h-[48px] font-body-lg text-body-lg" id="zeit_bis" name="zeit_bis" type="time"/>
</div>
</div>
</section>
<!-- Adresse Section -->
<section>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="adresse">Standort / Adresse</label>
<div class="relative">
<textarea class="w-full input-field rounded-lg px-md py-sm min-h-[48px] font-body-lg text-body-lg resize-none" id="adresse" name="adresse" placeholder="Adresse wird nach Kundenwahl vorausgefüllt..." rows="2"></textarea>
<span class="material-symbols-outlined absolute right-md top-sm text-on-surface-variant">location_on</span>
</div>
</section>
<!-- Terminart Section -->
<section>
<span class="block font-label-lg text-label-lg text-on-surface-variant mb-sm">Art des Termins</span>
<div class="flex flex-wrap gap-sm">
<label class="cursor-pointer">
<input checked="" class="sr-only peer" name="terminart" type="radio" value="regular"/>
<div class="px-md py-sm rounded-full border border-outline-variant peer-checked:chip-regular peer-checked:border-transparent font-label-lg text-label-lg transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
                        Regulär
                    </div>
</label>
<label class="cursor-pointer">
<input class="sr-only peer" name="terminart" type="radio" value="akut"/>
<div class="px-md py-sm rounded-full border border-outline-variant peer-checked:chip-akut peer-checked:border-transparent font-label-lg text-label-lg transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">warning</span>
                        Akut
                    </div>
</label>
<label class="cursor-pointer">
<input class="sr-only peer" name="terminart" type="radio" value="geplant"/>
<div class="px-md py-sm rounded-full border border-outline-variant peer-checked:chip-geplant peer-checked:border-transparent font-label-lg text-label-lg transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">update</span>
                        Geplant
                    </div>
</label>
</div>
</section>
<!-- Anmerkungen Section -->
<section>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="anmerkungen">Anmerkungen (Optional)</label>
<textarea class="w-full input-field rounded-lg px-md py-sm min-h-[48px] font-body-lg text-body-lg resize-none" id="anmerkungen" name="anmerkungen" placeholder="Besonderheiten, benötigtes Material..." rows="3"></textarea>
</section>
<!-- Primary Button -->
<section class="pt-md pb-xl">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg rounded-full py-md min-h-[48px] flex justify-center items-center gap-sm hover:bg-on-primary-fixed-variant transition-colors shadow-sm active:scale-[0.98]" type="button">
<span class="material-symbols-outlined" data-icon="save">save</span>
                Termin bestätigen
            </button>
</section>
</main>
<!-- Bottom Nav omitted because this is a transactional "New Entry" screen (per instructions: "Linear/Transactional: Login, Sign-up, Onboarding, Checkout, or "Success/Confirmation" splash screens... Task-Focused: Any sub-page featuring a "Close" or "Back" action... Automatic Suppression") -->
</body></html>
