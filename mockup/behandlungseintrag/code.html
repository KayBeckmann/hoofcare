<!DOCTYPE html><html class="antialiased" lang="de"><head>

<style>

        [type='text'], [type='email'], [type='url'], [type='password'], [type='number'], [type='date'], [type='datetime-local'], [type='month'], [type='search'], [type='tel'], [type='time'], [type='week'], [multiple], textarea, select {

        }
        [type='text']:focus, [type='email']:focus, [type='url']:focus, [type='password']:focus, [type='number']:focus, [type='date']:focus, [type='datetime-local']:focus, [type='month']:focus, [type='search']:focus, [type='tel']:focus, [type='time']:focus, [type='week']:focus, [multiple]:focus, textarea:focus, select:focus {

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-surface dark:bg-surface-dim flex items-center justify-between px-container-padding h-16 shadow-sm border-b border-surface-variant md:border-none">
<button class="text-on-surface hover:bg-surface-container-low rounded-full p-2 active:opacity-70 transition-opacity flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold md:font-headline-lg md:text-headline-lg">Neuer Eintrag</h1>
<button class="text-primary font-semibold hover:bg-surface-container-low rounded-full p-2 active:opacity-70 transition-opacity flex items-center justify-center">
<span class="material-symbols-outlined">check</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col w-full max-w-3xl mx-auto px-container-padding py-md space-y-lg">
<!-- Horse Selector & Date Row -->
<div class="flex flex-col space-y-md sm:flex-row sm:space-y-0 sm:space-x-md">
<!-- Horse Chip -->
<div class="flex items-center space-x-2 bg-primary-container/10 px-4 py-2 rounded-full w-fit">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">pets</span>
<span class="font-label-lg text-label-lg text-on-surface">Bella</span>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">arrow_drop_down</span>
</button>
</div>
<!-- Date Picker Readonly Display -->
<div class="flex items-center space-x-2 bg-surface-container-low px-4 py-2 rounded-full w-fit border border-surface-variant">
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
<span class="font-body-md text-body-md text-on-surface">Heute, 24. Okt 2023</span>
</div>
</div>
<!-- Treatment Type Dropdown -->
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="behandlungsart">Behandlungsart</label>
<div class="relative">
<select class="w-full px-4 py-3 appearance-none focus:outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface bg-surface border border-outline-variant rounded-xl shadow-sm" id="behandlungsart">
<option value="barhuf">Barhuf-Pflege</option>
<option value="beschlag">Beschlag</option>
<option value="korrektur">Korrekturschnitt</option>
<option value="akut">Akutbehandlung</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Befund Textarea -->
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="befund">Befund</label>
<textarea class="w-full px-4 py-3 focus:outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface bg-surface border border-outline-variant rounded-xl shadow-sm resize-none" id="befund" placeholder="Zustand der Hufe beschreiben..." rows="3"></textarea>
</div>
<!-- Maßnahmen Textarea -->
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="massnahmen">Maßnahmen</label>
<textarea class="w-full px-4 py-3 focus:outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface bg-surface border border-outline-variant rounded-xl shadow-sm resize-none" id="massnahmen" placeholder="Durchgeführte Arbeiten eintragen..." rows="3"></textarea>
</div>
<!-- Photo Section (Horizontal Scroll) -->
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Fotos (Dokumentation)</label>
<div class="flex overflow-x-auto hide-scroll space-x-card-gap pb-2">
<!-- Add Photo Tile 1 -->
<button class="flex-none w-24 h-24 bg-surface-container-high border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center text-on-surface-variant hover:border-primary hover:text-primary hover:bg-primary-container/5 transition-all">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
</button>
<!-- Add Photo Tile 2 -->
<button class="flex-none w-24 h-24 bg-surface-container-high border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center text-on-surface-variant hover:border-primary hover:text-primary hover:bg-primary-container/5 transition-all">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
<!-- Add Photo Tile 3 -->
<button class="flex-none w-24 h-24 bg-surface-container-high border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center text-on-surface-variant hover:border-primary hover:text-primary hover:bg-primary-container/5 transition-all">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</div>
<!-- Notizen Textarea -->
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="notizen">Notizen (Optional)</label>
<textarea class="w-full px-4 py-3 focus:outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface bg-surface border border-outline-variant rounded-xl shadow-sm resize-none" id="notizen" placeholder="Zusätzliche Anmerkungen..." rows="2"></textarea>
</div>
<!-- Action Button Row -->
<div class="pt-sm pb-lg mt-auto md:mt-lg">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-full shadow-md hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center space-x-2"><span class="material-symbols-outlined">save</span><span class="">Speichern &amp; Termin planen</span></button>
</div>
</main>
<!-- Note: BottomNavBar is intentionally suppressed here because this is a focused data-entry/task screen with a clear 'Save' or 'Cancel' (Back) exit path. The navigation shell should yield to the canvas. -->


</body></html>
