name: hufpflege_app
description: "Mobile App für Hufpfleger — Kunden, Pferde, Verlaufsakte, Termine."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local DB
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  # Photos
  image_picker: ^1.1.2

  # Internationalization / Date formatting
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.2.1

  # Calendar widget
  table_calendar: ^3.1.3

  # UUID generation
  uuid: ^4.5.1

  # Phone/email/maps links
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
